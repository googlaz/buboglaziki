name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.4'
          channel: 'stable'

      - name: Create Flutter platform folders
        run: flutter create --project-name buboglaziki --org com.family.buboglaziki .

      - name: Configure Android for Jitsi SDK
        run: |
          # Русское название приложения
          sed -i 's/android:label="buboglaziki"/android:label="Бубоглазики"/g' android/app/src/main/AndroidManifest.xml
          
          # Разрешения для интернета и звонков (Jitsi SDK)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_CAMERA" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_PHONE_CALL" />' android/app/src/main/AndroidManifest.xml
          
          # minSdkVersion 26 (требование Jitsi SDK)
          sed -i 's/flutter.minSdkVersion/26/g' android/app/build.gradle
          
          # Добавляем xmlns:tools для устранения конфликта свойств
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools">|g' android/app/src/main/AndroidManifest.xml
          
          # Настройка Google Services на уровне проекта
          sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.4.2"' android/build.gradle
          
          # Настройка Google Services на уровне приложения
          echo 'apply plugin: "com.google.gms.google-services"' >> android/app/build.gradle
          
          # Копируем конфиг Firebase (он лежит в корне нашего проекта)
          cp google-services.json android/app/google-services.json
          
          # Jitsi SDK требует FlutterFragmentActivity вместо FlutterActivity
          sed -i 's/FlutterActivity/FlutterFragmentActivity/g' android/app/src/main/kotlin/com/family/buboglaziki/buboglaziki/MainActivity.kt

      - name: Get dependencies
        run: flutter pub get

      - name: Patch app_links for Flutter 3.24 compatibility
        run: |
          APP_LINKS_GRADLE=$(find /home/runner/.pub-cache -path "*/app_links-*/android/build.gradle" | head -1)
          if [ -n "$APP_LINKS_GRADLE" ]; then
            echo "Patching $APP_LINKS_GRADLE"
            sed -i 's/flutter.compileSdkVersion/34/g' "$APP_LINKS_GRADLE"
            sed -i 's/flutter.minSdkVersion/21/g' "$APP_LINKS_GRADLE"
            sed -i 's/flutter.targetSdkVersion/34/g' "$APP_LINKS_GRADLE"
          fi

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Buboglaziki-APK
          path: build/app/outputs/flutter-apk/app-release.apk
