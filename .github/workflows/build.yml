name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      - name: Create Flutter platform folders Native
        run: |
          flutter create --project-name buboglaziki --org com.family.buboglaziki .
          
      - name: Configure required Android versions
        run: |
          sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle
          sed -i -E 's/id "org.jetbrains.kotlin.android" version "[^"]+"/id "org.jetbrains.kotlin.android" version "1.9.24"/g' android/settings.gradle
          sed -i "s/ext.kotlin_version = '<latest-version>'/ext.kotlin_version = '1.9.24'/g" android/build.gradle || true
          
      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Buboglaziki-APK
          path: build/app/outputs/flutter-apk/app-release.apk
